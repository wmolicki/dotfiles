# Use Ctrl-a as the tmux prefix instead of the default Ctrl-b.
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Keep the current window label compact and easy to spot in the status line.
setw -g window-status-current-format "#[reverse] #I:#W"

# Make the active pane easier to identify without adding extra UI chrome.
set -g pane-border-style "fg=#3f4954"
set -g pane-active-border-style "fg=#7aa2f7"

# Use Vim-style keys in copy mode and tmux prompts, and move between panes with h/j/k/l.
setw -g mode-keys vi
set -g status-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Improve terminal/editor integration and reduce Escape-key latency.
set -g focus-events on
set -sg escape-time 10
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Enable mouse support, keep deep scrollback, and start numbering at 1.
set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1

# Create new windows and splits in the current directory, and add quick pane/window jumps.
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind Space last-window
bind Tab last-pane

# Resize panes with repeatable Shift+H/J/K/L and reload tmux config with prefix+r.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"

# TPM manages tmux plugins. Sensible adds low-friction defaults.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Resurrect handles manual save/restore. Continuum adds periodic autosave and startup restore.
# prefix + Ctrl-s saves immediately
# prefix + Ctrl-r restores immediately
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Fuzzy-pick URLs from tmux output.
set -g @plugin 'wfxr/tmux-fzf-url'

run '~/.tmux/plugins/tpm/tpm'
